name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write    # to create GitHub releases
  id-token: write    # to publish to npm with provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed for git-cliff to read full history

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          # `actions/setup-node@v4` writes NODE_AUTH_TOKEN to the npm
          # config, which pnpm publish picks up. Token is set in env below.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches workspace versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CORE_VERSION=$(node -p "require('./packages/editor-core/package.json').version")
          if [ "$TAG_VERSION" != "$CORE_VERSION" ]; then
            echo "✗ tag $GITHUB_REF_NAME does not match editor-core version $CORE_VERSION"
            exit 1
          fi
          echo "✓ tag matches workspace version $TAG_VERSION"

      - name: Build all packages
        run: pnpm -r build

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Publish to npm
        # `pnpm publish -r` walks workspaces; `--filter "@swarmnote/*"`
        # skips the private root package; `--no-git-checks` because CI
        # works on a tag-detached commit; `--access public` enforced by
        # each package's `publishConfig.access`.
        run: pnpm -r --filter "@swarmnote/*" publish --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Extract release notes for this tag
        id: notes
        run: |
          # Use git-cliff to extract just this version's section
          npx -y git-cliff --current --strip all -o RELEASE_NOTES.md
          echo "notes_path=RELEASE_NOTES.md" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
